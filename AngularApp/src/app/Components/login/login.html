<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm p-4 rounded-0" style="max-width: 400px; width: 100%;">
    <form
      [formGroup]="userForm"
      (ngSubmit)="submitLoginClicked(); $event.preventDefault()"
      novalidate
    >
      <h2 class="text-center mb-4 fw-bold text-primary">Login</h2>

      <!-- Username -->
      <div class="mb-3">
        <label for="uname" class="form-label">Username</label>
        <input
          type="text"
          id="uname"
          class="form-control rounded-0"
          placeholder="Enter username"
          formControlName="username"
          required
          autofocus
        />
        
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="psw" class="form-label">Password</label>
        <input
          type="password"
          id="psw"
          class="form-control rounded-0"
          placeholder="Enter password"
          formControlName="password"
          required
        />
      </div>

      <!-- Backend error message -->
       @if (loginError.text!="") 
       {
<div class="alert alert-danger py-2 rounded-0">
        {{ loginError.text }}
      </div>
       }
      

      <!-- Remember me & Forgot password -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" formControlName="remember" checked />
          <label class="form-check-label" for="remember">Remember me</label>
        </div>

        <a routerLink="/forgot" routerLinkActive="active" class="btn btn-link p-0" (click)="forgot()">Forgot password?</a>
      
      </div>

      <!-- Submit button -->
      <button
        type="submit"
        class="btn btn-primary w-100 rounded-0"
        [disabled]="!userForm.valid"
      >
        Login
      </button>
    </form>
  </div>
</div>
