<div class="container my-4">
<!-- -->
  <div class="d-flex justify-content-center mb-4">
    <ngx-charts-pie-chart
      [results]="dataPC2"
      [view]="viewPC"
      [animations]="animationPC"
      [scheme]="colorSchemePC"
      [labels]="labelsPC"
      [doughnut]="doughnut"
      [tooltipText]="percentageFormatterPC"
      [legend]="true"
      (select)="clickedChart($event)"
      (activate)="activate($event)"
      (deactivate)="deactivate($event)"
      (dblclick)="dblClicked($event)"
      class="shadow-sm rounded-0"
      style="max-width: 600px; width: 100%;"
    >
    </ngx-charts-pie-chart>
 </div>
<div class="d-flex justify-content-center mb-4">
    <ngx-charts-advanced-pie-chart
      [results]="dataPC2"
      [view]="viewPC"
      [animations]="animationPC"
      [scheme]="colorSchemePC"
      [tooltipText]="percentageFormatterPC"
      (select)="clickedChart($event)"
      (activate)="activate($event)"
      (deactivate)="deactivate($event)"
      (dblclick)="dblClicked($event)"
      class="shadow-sm rounded-0"
      style="max-width: 600px; width: 100%;"
    >
    </ngx-charts-advanced-pie-chart>
 </div>
<div class="d-flex justify-content-center mb-4">
  <ngx-charts-bar-vertical
      [results]="dataVBC"
      [view]="viewVBC"
      [animations]="animationsVBC"
      [legend]="legendVBC"
      [xAxis]="xAxisVBC"
      [yAxis]="yAxisLabelVBC"
      [showYAxisLabel]="showYAxisLabelVBC"
      [yAxisLabel]="yAxisLabelVBC"
      [dataLabelFormatting]="dataLabelFormatterVBC"
    ></ngx-charts-bar-vertical>
</div>

<div class="d-flex justify-content-center mb-4">
<ngx-charts-line-chart
      [results]="dataLC"
      [view]="viewLC"
      [animations]="animationsLC"
      [showGridLines]="showGridLinesLC"
      [legend]="legendLC"
      [legendTitle]="legendTitleLC"
      [roundDomains]="roundDomainsLC"
      [xAxis]="true"
      [yAxis]="true"
      [yAxisTickFormatting]="currencyFormatterLC"
      [xAxisTickFormatting]="dateFormatterLC"
    ></ngx-charts-line-chart>
</div>


  <div class="row g-2 align-items-end mb-4">
    <div class="col-md-6">
      <label for="key" class="form-label fw-semibold">Key</label>
      <input
        type="text"
        id="key"
        class="form-control rounded-0"
        placeholder="Enter key"
        [(ngModel)]="key"
        required
      />
    </div>
    <div class="col-md-3">
      <button
        class="btn btn-primary w-100 rounded-0 fw-semibold shadow-sm mt-4"
        (click)="setNewData()"
      >
        New Data
      </button>
    </div>
  </div>

</div>
