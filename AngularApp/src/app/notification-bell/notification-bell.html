
<div class="position-relative d-inline-block" style="cursor: pointer;">
  
  <span class="bi bi-bell" style="font-size: 1.5rem;" (click)="open()"></span>
@if (notSer.unreadCount()>0) {
  
  <span
    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
    style="font-size: 0.7rem;"
  (click)="open()">
    {{ notSer.unreadCount() }}
  </span>
}

@if (isOpen()) {
    <div
      class="dropdown-menu show p-0 shadow"
      style="width: 400px; max-height: 300px; overflow: hidden; right: 0; left: auto;"
    >
  <app-notification-list></app-notification-list>
  </div>
  }


</div>
